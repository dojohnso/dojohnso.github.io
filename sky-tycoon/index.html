<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sky Tycoon</title>
<meta name="description" content="Fly jobs, earn money, and upgrade your plane from a single-prop to a jet!">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#001a33">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sky Tycoon">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root { --ink:#001a33; --gold:#ffd83a; --sky:#5c94fc; --sky2:#8fb6ff; --grass:#3a7d3a; }
  :root {
    --spr-prop: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAQCAYAAAB3AH1ZAAAAAXNSR0IArs4c6QAAASlJREFUSIljYBgFWECViMj/KhGR//SwiwmboJuqOIObqjg97GdgQeZUiYj8d1MVZ1AXFqSL5QwMOEJg8okbDAwMDAwHLLWpHg3X7j5GMRMlBNrevGF0UxX/76YqznDz7Xu8BpHqOIfjVxkZGBgYbty+iyLOgq7w5c/fDOLsrHB+lYjI/1wLDaIsWd61heHsow8MxnICDAwMDAyGIhwMGkkucHMYGBgY7ty5w5BdWPF/an8HI1YHXHz0jkFfTgjFEcSCyDIfhkgCalRUVBge3r0D5zMSYzC24H758zfDxUfvGBgYGBj05YTgbGSgLyfEEH7uFood1+4+/q+lLAsXwwgBbAAWf+ggW0HiPwMDA8Ohd58YGHhYGKY+eIGq7s0bDD3oaWAUjIIBBwB+kVWX/FFOmwAAAABJRU5ErkJggg==");
    --spr-twin: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACgAAAASCAYAAAApH5ymAAAAAXNSR0IArs4c6QAAAS1JREFUSIljYBgFo2AQA6mgsv/yyRP/D6QbmPBJ8us5M3DJajAMpCNxOlAqqOz/t8c3GLgllBi4ZDXIMnzdjgP/swsrKPIcCy6JZ+u6GBkYGBhETb2IsiA2t+6/kjw/AwMDA8O9hx8Zrt95wHDnzh1K3MbAwMDAwIhLQiqo7D+roDTZocfAwMDQasHOUH3iJ0F13x7fYPj9/ik8UEh2ILeEEtmOhAF1BVYGYzkBBgYGBgZDEQ4GBgYGhtJ1j+Hyr09vY0jQ/MPQWFKM4iacDsTmUFoBskIQH4A5Ghv4/f4pAwMDAwOyPC7LiQFkaWJgQGSK6bvuMTAwMDC4qwszXL/zgCHM246hLCeFUcwt+z8DAwPDq11TybaDKqC+p/d/bG4dPKdTo2gZBaNgMAEAX+Nj9tt3Iz4AAAAASUVORK5CYII=");
    --spr-turbo: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACwAAAASCAYAAAAg9DzcAAAAAXNSR0IArs4c6QAAAUpJREFUSInt1L9LAmEcx/H3hdCUFPnjXCTjBm1u6F/oX/Coqe1qiCKaippECol0CNyixuYggjAwHCJCkIYydDmRC5SWcHmaPM5LMeNSh3ttz8MXns/z5fs84HK5hkqyb2QuLkU0HEGWfdRqBi/VdzQ1/qNuVCbsG5oal3KFPEF/AFn2Udf1UeTqcHV9J/oWGY2muL1/6F84BMl0VmibuwLA06vouVgiV8h3jAhA0B9wJESxNcmT8QXAY7UBwMnSjHm2fRQzqYQEXWbYav/oWARCIaLhCLEblY9SmdmFeabCDUdCd/NZnQbgzKsBUK408XpaZuhfPaZ2cE2NS+2O/6dcIc/B9paZLZnOip31tf4dHkT7UlZ1Xe84+K+S6ayovL2SSSWknjM8iJWNPQGYP4oTIa0URcGRDi8ur4qYMmeuz08Px+a/drnG1TeBTHKWWNEWIwAAAABJRU5ErkJggg==");
    --spr-jet: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADAAAAASCAYAAAAdZl26AAAAAXNSR0IArs4c6QAAAUpJREFUSIntlb9LAlEcwD+GBC1xntcU2pB7g/4T/hE6uaVDFNKkk1CiNKSb0FKN1RLYIEQQheBQU+RZGDglUm1F8Rrk5C5P7LiLFO6zvR+89/28977fBy4utvD87Fhd2xRLyyEA0snE0PikYRrgUfVcAKiqOhUSplzUb4UmMsnMjBq4rtdRZJl8qWKQyBaKonxwKLKF4kTIjRQA6PZ6hnYkGhcP7Vf29quc1m6IpTL/LjH2fedLFREK9ZNakeVBv+L32do41/wiHJRoPL0QDkoANC47PB7nAKjsbg/m3jVbI/NxrIC+Kp3czwEgBQIA+CS/LQkrrLxf0W6plHe2DDH/usJoIulkwqPlhXYzf03trAowFDxYELCK/ulBvySbnaBdHBeIpTJi3vuBsrgAQLfz7HjQerxOLhaJxgXA2+cs5Y316fwAXVymjG8nunAOAGI5RgAAAABJRU5ErkJggg==");
  }
  html, body { height: 100%; }
  body {
    font-family: 'Courier New', monospace;
    background: #11131d; color: #fff;
    display: flex; justify-content: center; align-items: center;
    image-rendering: pixelated;
  }
  #app {
    width: 100%; max-width: 420px; height: 100%; max-height: 760px;
    background: var(--sky); display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  /* top bar */
  #topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; background: var(--ink);
  }
  #money { font-size: 22px; font-weight: 800; color: var(--gold); text-shadow: 2px 2px 0 #000; }
  #planeName { font-size: 12px; opacity: .9; }
  /* scene */
  #scene {
    height: 180px; position: relative; overflow: hidden;
    background: linear-gradient(180deg, var(--sky) 0%, var(--sky2) 72%, var(--grass) 72%, var(--grass) 100%);
    flex-shrink: 0;
  }
  /* content card */
  #content { flex: 1; overflow-y: auto; padding: 12px; background: #1b2030; }
  /* bottom nav */
  #nav { display: flex; background: var(--ink); }
  .nav-btn {
    flex: 1; padding: 16px 0; text-align: center; font-weight: 800; font-size: 13px;
    color: #fff; background: var(--ink); border: none; border-top: 3px solid transparent;
    cursor: pointer; font-family: inherit; letter-spacing: 1px;
  }
  .nav-btn.active { color: var(--gold); border-top-color: var(--gold); }
  /* home button */
  #homeBtn { width:32px; height:32px; flex-shrink:0; margin-right:10px;
    background:#0a2a4a; color:var(--gold); border:2px solid #1d4a72; border-radius:6px;
    font-family:inherit; font-weight:800; font-size:18px; line-height:1; cursor:pointer; padding:0; }
  #homeBtn:active { background:#1d4a72; }
  @media (hover: hover) { #homeBtn:hover { background:#1d4a72; } }
  /* scene layers + plane + progress */
  #scene > * { position:absolute; }
  /* parallax scenery layers: a 200%-wide strip we slide leftward to scroll */
  .layer { top:0; left:0; height:100%; width:200%; will-change:transform; }
  .layer.scroll-clouds { animation: scrollX 9s linear infinite; }   /* slow = far */
  .layer.scroll-trees  { animation: scrollX 3.2s linear infinite; } /* fast = near */
  .layer.paused { animation-play-state:paused; }
  @keyframes scrollX { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  .cloud { position:absolute; background:#fff; border-radius:50px; opacity:.85; }
  .tree  { position:absolute; bottom:0; }
  .tree .trunk { position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    width:6px; height:14px; background:#6b4a2b; }
  .tree .leaves { position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
    width:26px; height:26px; background:#2f6b2f; border-radius:6px;
    box-shadow:0 -8px 0 -4px #357a35, -10px 4px 0 -6px #2f6b2f, 10px 4px 0 -6px #2f6b2f; }
  .bush { position:absolute; bottom:0; width:20px; height:12px; background:#357a35; border-radius:8px 8px 0 0; }
  /* Airports (departure + arrival). Centered base; renderScene drives each one's
     transform every tick at the trees' ground speed, so parallax matches. The
     runway top sits at the plane's wheel line (~140px); the plane renders on top
     so its wheels visually rest on the tarmac. Hidden while fully off-screen so
     a repositioned element never streaks across view. */
  .airport { position:absolute; left:50%; bottom:0; transform:translateX(-50%);
    width:160px; height:50px; pointer-events:none;
    /* The airport is repositioned by JS each 100ms tick; a linear transform
       transition slightly longer than the tick interpolates between steps so it
       glides like the CSS-animated trees instead of stepping ~13px at 10fps.
       Each airport only moves one direction, so this never animates a big jump. */
    transition:transform .12s linear; }
  .airport.hidden { visibility:hidden; }
  .runway { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); width:120px; height:12px;
    background:#6b7178; border-top:2px solid #aeb8c0;
    background-image:repeating-linear-gradient(90deg, #fff 0 10px, transparent 10px 24px);
    background-size:100% 3px; background-repeat:no-repeat; background-position:center; }
  .tower { position:absolute; bottom:30px; right:0; width:11px; height:26px; background:#9aa3ad; }
  .tower-cab { position:absolute; top:-8px; left:-4px; width:18px; height:10px;
    background:#3a5a78; border:2px solid #cfd6dd; box-sizing:border-box; }
  .plane { left:50%; transform:translateX(-50%);
    background-repeat:no-repeat; background-position:center; background-size:contain;
    image-rendering:pixelated; image-rendering:crisp-edges;
    transition:top .12s linear; }
  /* Per-tier sprites (embedded). Heights scale up the native pixel art ~4x. */
  .plane[data-plane="prop"]  { width:128px; height:64px; background-image:var(--spr-prop); }
  .plane[data-plane="twin"]  { width:152px; height:68px; background-image:var(--spr-twin); }
  .plane[data-plane="turbo"] { width:164px; height:68px; background-image:var(--spr-turbo); }
  .plane[data-plane="jet"]   { width:176px; height:68px; background-image:var(--spr-jet); }
  /* gentle bob layered on top of the progress-driven top position */
  .plane.flying { animation: bob 1.4s ease-in-out infinite; }
  @keyframes bob { 0%,100%{margin-top:0} 50%{margin-top:-4px} }
  .flight-label { position:absolute; bottom:34px; width:100%; text-align:center;
    font-size:12px; font-weight:800; letter-spacing:1px; text-shadow:1px 1px 0 #003; }
  .progress { position:absolute; bottom:14px; left:14px; right:14px; height:12px;
    background:var(--ink); border:2px solid #fff; }
  .progress > i { display:block; height:100%; background:var(--gold); }
  /* flight HUD (label + progress) only shows while a flight is active */
  #scene:not(.flying) .flight-label, #scene:not(.flying) .progress { display:none; }
  /* job board */
  .job-board { display:flex; flex-direction:column; gap:8px; }
  .job { display:flex; align-items:center; gap:10px;
    background:#252b3d; border:2px solid #3a425c;
    padding:10px 12px; cursor:pointer; position:relative; overflow:hidden; }
  .job.disabled { opacity:.6; cursor:default; }
  /* the in-flight job: full opacity + a gold fill that tracks progress (--pct) */
  .job.active { opacity:1; border-color:var(--gold); }
  .job.active::before { content:''; position:absolute; inset:0; z-index:0;
    width:var(--pct,0%); background:linear-gradient(90deg, rgba(255,216,58,.28), rgba(255,216,58,.14));
    transition:width .12s linear; pointer-events:none; }
  .job > * { position:relative; z-index:1; }
  .job-main { flex:1; min-width:0; }
  .job-who { font-weight:800; font-size:13px; }
  .job-meta { font-size:13px; color:#c8d2e0; font-weight:600; margin-top:3px; }
  .job-pay { font-weight:800; color:var(--gold); text-align:right; font-size:14px; }
  .job-pay .lock { display:block; font-size:11px; color:#ff6b5e; font-weight:700; margin-top:3px; }
  .job-decline { flex-shrink:0; width:26px; height:26px; border:none; cursor:pointer;
    background:#3a425c; color:#c8d2e0; font-family:inherit; font-weight:800; font-size:13px;
    border-radius:50%; line-height:1; padding:0; opacity:.85; }
  .job-decline:active { background:#ff6b5e; color:#fff; opacity:1; }
  @media (hover: hover) {
    .job-decline:hover { background:#ff6b5e; color:#fff; opacity:1; }
  }
  /* stat panel (main view) + shared segmented bars */
  .stat-panel { display:flex; gap:10px; margin-bottom:12px; }
  .stat-row { flex:1; background:#252b3d; border:2px solid #3a425c; padding:8px 10px; }
  .stat-label { font-size:11px; font-weight:800; letter-spacing:1px; color:#9fb0c8; }
  .stat-val { font-size:17px; font-weight:800; color:#fff; margin:2px 0 6px; }
  .stat-max { font-size:10px; font-weight:800; color:var(--ink); background:var(--gold);
    padding:1px 5px; border-radius:3px; vertical-align:middle; letter-spacing:1px; }
  /* queue strip (FLY view) */
  .queue-strip { margin-bottom:12px; }
  .queue-label { font-size:11px; font-weight:800; letter-spacing:1px; color:#9fb0c8; margin-bottom:6px; }
  .queue-slots { display:flex; gap:6px; }
  .queue-slot { flex:1; min-width:0; height:46px; border:2px solid #3a425c; border-radius:4px;
    background:#1b2030; display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:11px; color:#c8d2e0; padding:2px; }
  .queue-slot.filled { background:#252b3d; border-color:#5bb8e0; cursor:pointer; }
  .queue-slot.empty  { border-style:dashed; color:#5a6577; }
  .queue-slot .qs-place { font-weight:800; font-size:11px; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; max-width:100%; }
  .queue-slot .qs-meta { opacity:.8; }
  .statbar { display:flex; gap:3px; }
  .statbar > i { flex:1; height:8px; background:#10141f; border:1px solid #3a425c; }
  .statbar > i.on { background:#5bb8e0; border-color:#5bb8e0; }
  .statbar.maxed > i.on, .statbar > i.max { background:var(--gold); border-color:var(--gold); }
  /* upgrade */
  .up-card { background:#252b3d; border:2px solid #3a425c; padding:12px; margin-bottom:10px; }
  .up-title { font-size:13px; font-weight:800; margin-bottom:8px; }
  .up-card .statbar { margin-bottom:10px; }
  .up-maxed { text-align:center; font-size:12px; font-weight:800; color:var(--gold);
    background:#1a2030; border:2px dashed #4a5570; padding:11px 8px; letter-spacing:.5px; }
  .up-btn, .buy-btn { font-family:inherit; font-weight:800; font-size:13px; color:var(--ink);
    background:var(--gold); border:none; padding:12px; width:100%; cursor:pointer; }
  .up-btn.disabled, .buy-btn.disabled { background:#555c70; color:#9aa; cursor:default; }
  /* shop */
  .shop-list { display:flex; flex-direction:column; gap:8px; }
  .plane-row { display:flex; align-items:center; gap:12px;
    background:#252b3d; border:2px solid #3a425c; padding:12px; }
  .plane-thumb { flex-shrink:0; width:72px; height:40px;
    background-repeat:no-repeat; background-position:center; background-size:contain;
    image-rendering:pixelated; image-rendering:crisp-edges; }
  .plane-thumb[data-plane-thumb="prop"]  { background-image:var(--spr-prop); }
  .plane-thumb[data-plane-thumb="twin"]  { background-image:var(--spr-twin); }
  .plane-thumb[data-plane-thumb="turbo"] { background-image:var(--spr-turbo); }
  .plane-thumb[data-plane-thumb="jet"]   { background-image:var(--spr-jet); }
  .plane-info { flex:1; min-width:0; }
  .plane-name { font-weight:800; font-size:14px; }
  .plane-stats { font-size:11px; opacity:.8; margin-top:2px; }
  .buy-btn { flex-shrink:0; width:auto; padding:10px 16px; }
  .owned { flex-shrink:0; color:#7cff7c; font-weight:800; font-size:12px; }
  .switch-btn { flex-shrink:0; width:auto; padding:10px 16px; font-family:inherit;
    font-weight:800; font-size:13px; color:#fff; background:#1d6fa5; border:none; cursor:pointer; }
  .switch-btn.disabled { background:#555c70; color:#9aa; cursor:default; }
  /* title screen */
  #title { display:none; position:absolute; inset:0; z-index:20; overflow:hidden;
    flex-direction:column; align-items:center; justify-content:center; gap:18px;
    background:linear-gradient(180deg, var(--sky) 0%, var(--sky2) 70%, var(--grass) 70%, var(--grass) 100%); }
  body.show-title #title { display:flex; }
  body.show-title #app { display:none; }
  #title-clouds { position:absolute; inset:0; pointer-events:none; }
  .t-cloud { position:absolute; background:#fff; border-radius:50px; opacity:.85; }
  #title-plane { width:160px; height:80px; background:var(--spr-prop) center/contain no-repeat;
    image-rendering:pixelated; image-rendering:crisp-edges; animation:title-bob 2s ease-in-out infinite; }
  @keyframes title-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  #title-name { color:#fff; font-size:30px; font-weight:800; letter-spacing:1px;
    text-shadow:3px 3px 0 #003; text-align:center; }
  #title-buttons { display:flex; flex-direction:column; gap:12px; width:220px; z-index:1; }
  .t-btn { font-family:inherit; font-weight:800; font-size:16px; padding:14px 0; width:100%;
    border:none; border-radius:8px; cursor:pointer; letter-spacing:1px; }
  .t-primary { background:var(--gold); color:var(--ink); }
  .t-secondary { background:#0a2a4a; color:#fff; border:2px solid #1d4a72; }
  .t-danger { background:#ff6b5e; color:#fff; }
  #title-confirm { z-index:1; width:240px; text-align:center; background:#001a33cc;
    border:2px solid #1d4a72; border-radius:8px; padding:14px; }
  .confirm-text { color:#fff; font-weight:700; font-size:14px; margin-bottom:12px; }
  .confirm-row { display:flex; gap:10px; }
  .confirm-row .t-btn { font-size:14px; padding:11px 0; }
</style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <button id="homeBtn" data-home aria-label="Home" title="Home">⌂</button>
      <div id="money">$0</div>
      <div id="planeName">Single Prop</div>
    </div>
    <div id="scene"></div>
    <div id="content"></div>
    <div id="nav">
      <button class="nav-btn active" data-view="fly">FLY</button>
      <button class="nav-btn" data-view="upgrade">UPGRADE</button>
      <button class="nav-btn" data-view="shop">SHOP</button>
    </div>
  </div>
  <div id="title">
    <div id="title-clouds">
      <div class="t-cloud" style="top:14%;left:8%;width:64px;height:20px"></div>
      <div class="t-cloud" style="top:26%;left:60%;width:84px;height:24px"></div>
      <div class="t-cloud" style="top:40%;left:30%;width:54px;height:18px"></div>
    </div>
    <div id="title-plane"></div>
    <h1 id="title-name">✈ Sky&nbsp;Tycoon</h1>
    <div id="title-buttons"></div>
    <div id="title-confirm" hidden>
      <div class="confirm-text">Erase your progress and start over?</div>
      <div class="confirm-row">
        <button class="t-btn t-danger" data-title-action="confirm-new">Erase</button>
        <button class="t-btn t-secondary" data-title-action="cancel-new">Cancel</button>
      </div>
    </div>
  </div>
<script>
  'use strict';

  // ---- Config ----
  // Each plane upgrades up to MAX_UPGRADES times per stat. Steps are tuned so a
  // fully-upgraded plane lands just below the next plane's base — maxing out a
  // plane pushes you to buy the next one to reach bigger/faster jobs.
  //   Capacity: prop 2→7,  twin 8→13,  turbo 14→24, jet 26→41
  //   Speed:    prop 1.0→2.0, twin 2.2→3.2, turbo 3.4→4.9, jet 5.1→7.1
  const MAX_UPGRADES = 5;   // upgrades allowed per stat, per plane
  const PLANES = [
    { id: 'prop',  name: 'Single Prop', cap: 2,  speed: 1.0, price: 0,    capStep: 1, speedStep: 0.2 },
    { id: 'twin',  name: 'Twin Prop',   cap: 8,  speed: 2.2, price: 400,  capStep: 1, speedStep: 0.2 },
    { id: 'turbo', name: 'Turboprop',   cap: 14, speed: 3.4, price: 2000, capStep: 2, speedStep: 0.3 },
    { id: 'jet',   name: 'Small Jet',   cap: 26, speed: 5.1, price: 8000, capStep: 3, speedStep: 0.4 },
  ];
  const BOARD_SIZE = 5;     // jobs visible at once
  const QUEUE_BASE = 2;            // jobs you can queue with no upgrades
  const MAX_QUEUE_UPGRADES = 4;    // queue grows from 2 up to 6
  const QUEUE_COSTS = [50, 120, 250, 500];  // cost of the Nth queue upgrade (0-indexed)
  function queueUpgradeCost(count) { return QUEUE_COSTS[count]; }

  // ---- Pure helpers ----
  // Cost of the next upgrade given how many of that stat you've already bought.
  function upgradeCost(count) { return 15 * count + 15; }

  function planeStats(planeId, speedUps, capUps) {
    const base = PLANES.find(p => p.id === planeId);
    return {
      name: base.name,
      capacity: base.cap + capUps * base.capStep,
      speed: +(base.speed + speedUps * base.speedStep).toFixed(2),
    };
  }

  const CUSTOMERS = ['Mara','Theo','Iris','Gus','Pip','Nadia','León','Wren','Otto','Suki'];
  const PLACES = ['Riverside','Pine Bluff','Cedar Cove','Fox Hollow','Bayfield','Stonepark','Larkton','Mistport'];

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // capacity: player's current capacity, used to scale job size.
  // forceTakeable: clamp cargo to capacity so the job is always acceptable
  // (used to guarantee the board never soft-locks with only too-big jobs).
  function generateJob(capacity, forceTakeable) {
    const maxCargo = forceTakeable ? capacity : Math.max(2, Math.round(capacity * 1.5));
    const cargo = 1 + Math.floor(Math.random() * maxCargo);
    const flightTime = 5 + Math.floor(Math.random() * 6);  // 5–10 base seconds
    const payout = Math.round((cargo * 4 + flightTime * 1.5) * (1 + Math.random() * 0.4) * 0.55);
    return {
      id: 'j' + Math.random().toString(36).slice(2, 9),
      customer: pick(CUSTOMERS),
      place: pick(PLACES),
      cargo, flightTime, payout,
    };
  }

  function canTakeJob(job, capacity) { return job.cargo <= capacity; }

  // ---- State ----
  const SAVE_KEY = 'skyTycoonSave_v1';
  let state = null;

  function freshState() {
    return {
      money: 0,
      planeId: 'prop',
      // Owned planes → their per-plane upgrade counts. You start owning the prop.
      planes: { prop: { speedUps: 0, capUps: 0 } },
      jobs: [],
      queue: [],          // jobs lined up to run after the active flight, in order
      queueUps: 0,        // GLOBAL queue-size upgrade count (not per-plane)
      activeFlight: null, // { jobId, place, totalMs, elapsedMs, payout }
    };
  }

  function save() {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  function load() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return freshState();
      const parsed = JSON.parse(raw);
      // Merge onto fresh defaults so missing fields don't break older saves.
      const merged = Object.assign(freshState(), parsed);
      if (!Array.isArray(merged.jobs)) merged.jobs = [];
      if (!Array.isArray(merged.queue)) merged.queue = [];   // corrupt/old save → empty queue
      // Migrate legacy saves (old single-plane shape: top-level speedUps/capUps,
      // no own `planes` map). Decide based on the SAVED data (parsed), because
      // freshState() always supplies a default planes map. Seed the planes map
      // from the saved plane's upgrades so the player keeps them.
      const legacyPlanes = !parsed.planes || typeof parsed.planes !== 'object';
      if (legacyPlanes) {
        merged.planes = { [merged.planeId]: { speedUps: parsed.speedUps || 0, capUps: parsed.capUps || 0 } };
      }
      // Reject a tampered/unknown current plane id rather than crashing later
      // stat reads (planeStats would dereference an undefined PLANES entry).
      if (!PLANES.find(p => p.id === merged.planeId)) return freshState();
      // Always ensure the current plane has an upgrade record so stat reads can't crash.
      if (!merged.planes[merged.planeId]) {
        merged.planes[merged.planeId] = { speedUps: 0, capUps: 0 };
      }
      // Drop the now-unused legacy top-level counts.
      delete merged.speedUps;
      delete merged.capUps;
      return merged;
    } catch (e) { return freshState(); }
  }

  // The upgrade record for the plane currently being flown.
  function curPlane() { return state.planes[state.planeId]; }

  function queueSize() { return QUEUE_BASE + state.queueUps; }   // current max queue length
  function currentStats() { return planeStats(state.planeId, curPlane().speedUps, curPlane().capUps); }

  // ---- Actions ----
  function refillBoard() {
    const cap = currentStats().capacity;
    while (state.jobs.length < BOARD_SIZE) state.jobs.push(generateJob(cap));
    // Anti-soft-lock: if nothing on the board is takeable (e.g. maxed plane but
    // every job rolled too big), replace one slot with a guaranteed-takeable job
    // so the player can always earn money toward the next plane.
    if (!state.jobs.some(j => canTakeJob(j, cap))) {
      state.jobs[state.jobs.length - 1] = generateJob(cap, true);
    }
  }

  // Drop a job from the board (no cost) and pull a fresh one in its place.
  function declineJob(jobId) {
    const before = state.jobs.length;
    state.jobs = state.jobs.filter(j => j.id !== jobId);
    if (state.jobs.length === before) return false; // unknown id
    refillBoard();
    save();
    return true;
  }

  // Add a takeable board job to the queue (only while a flight is active and the
  // queue has room). Moves the job off the board and refills. Isolated so a future
  // autopilot can call it. Returns true if queued.
  function enqueueJob(job) {
    if (!state.activeFlight) return false;                 // queue only while flying
    if (state.queue.length >= queueSize()) return false;   // queue full
    if (!canTakeJob(job, currentStats().capacity)) return false; // takeable only
    state.jobs = state.jobs.filter(j => j.id !== job.id);  // move off the board
    state.queue.push(job);
    refillBoard();
    save();
    return true;
  }

  // Remove a job from the queue (it disappears; board refills to stay full).
  function dequeueJob(jobId) {
    const before = state.queue.length;
    state.queue = state.queue.filter(j => j.id !== jobId);
    if (state.queue.length === before) return false;       // unknown id
    refillBoard();
    save();
    return true;
  }

  function startJob(job) {
    if (state.activeFlight) return false;
    const cap = currentStats().capacity;
    if (!canTakeJob(job, cap)) return false;
    const totalMs = (job.flightTime / currentStats().speed) * 1000;
    state.activeFlight = {
      jobId: job.id, place: job.place,
      totalMs, startedAt: Date.now(), elapsedMs: 0, payout: job.payout,
    };
    save();
    return true;
  }

  function completeFlight() {
    const f = state.activeFlight;
    if (!f) return;
    state.money += f.payout;
    state.jobs = state.jobs.filter(j => j.id !== f.jobId); // harmless if it was a queued job
    state.activeFlight = null;
    // Auto-advance: if jobs are queued, take off with the next one immediately.
    if (state.queue.length > 0) {
      startJob(state.queue.shift());                       // startJob saves; uses current stats
    }
    refillBoard();
    save();
  }

  function buyEngineUpgrade() {
    const cp = curPlane();
    if (cp.speedUps >= MAX_UPGRADES) return false;   // this plane maxed on speed
    const cost = upgradeCost(cp.speedUps);
    if (state.money < cost) return false;
    state.money -= cost;
    cp.speedUps += 1;
    save();
    return true;
  }

  function buyCargoUpgrade() {
    const cp = curPlane();
    if (cp.capUps >= MAX_UPGRADES) return false;     // this plane maxed on capacity
    const cost = upgradeCost(cp.capUps);
    if (state.money < cost) return false;
    state.money -= cost;
    cp.capUps += 1;
    save();
    return true;
  }

  function buyQueueUpgrade() {
    if (state.queueUps >= MAX_QUEUE_UPGRADES) return false; // queue maxed
    const cost = queueUpgradeCost(state.queueUps);
    if (state.money < cost) return false;
    state.money -= cost;
    state.queueUps += 1;
    save();
    return true;
  }

  function buyPlane(planeId) {
    if (state.activeFlight) return false;                // can't buy/swap mid-flight
    const plane = PLANES.find(p => p.id === planeId);
    if (!plane || state.planes[planeId]) return false;   // invalid or already owned
    if (state.money < plane.price) return false;
    state.money -= plane.price;
    state.planes[planeId] = { speedUps: 0, capUps: 0 };  // now owned, fresh upgrades
    state.planeId = planeId;                             // start flying it
    // New (larger) capacity may make current locked jobs takeable; board stays.
    save();
    return true;
  }

  function switchPlane(planeId) {
    if (state.activeFlight) return false;                // can't switch mid-flight
    if (!state.planes[planeId] || planeId === state.planeId) return false; // unowned or already flying
    state.planeId = planeId;
    save();
    return true;
  }

  // ---- Render ----
  let currentView = 'fly';
  const $ = sel => document.querySelector(sel);

  // Top-level screen: 'title' or 'game'. Transient (not persisted) — a reload
  // always returns to the title; only the game save persists.
  let screen = 'title';
  // Whether a save existed when the app loaded (captured before boot re-saves),
  // so the title shows Continue/New for returning players but Start for new ones.
  let savePresentAtLoad = false;

  function hasSave() { return savePresentAtLoad; }

  function renderTitle() {
    const btns = $('#title-buttons');
    if (hasSave()) {
      btns.innerHTML =
        '<button class="t-btn t-primary" data-title-action="continue">Continue</button>' +
        '<button class="t-btn t-secondary" data-title-action="new">New Game</button>';
    } else {
      btns.innerHTML =
        '<button class="t-btn t-primary" data-title-action="start">Start Game</button>';
    }
    $('#title-confirm').hidden = true;   // always start with confirm hidden
  }

  function showTitle() {
    if (screen === 'game') save();       // preserve progress when leaving the game
    screen = 'title';
    renderTitle();
    document.body.classList.add('show-title');
  }

  function startGame() {
    screen = 'game';
    savePresentAtLoad = true;   // once playing, the title should offer Continue
    document.body.classList.remove('show-title');
    refillBoard();
    save();                     // persist immediately so Continue/refresh resumes this game
    renderAll();
  }

  function resetGame() {
    // Mutate state only; startGame() then refills the board and saves.
    try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
    state = freshState();
  }

  function fmt(n) { return '$' + n.toLocaleString('en-US'); }

  // A segmented upgrade-progress bar. Drawn with MAX_UPGRADES+1 pips and the
  // first pip always lit (a fresh plane reads as 1/6, not an empty/decorative
  // bar), filling one more per upgrade up to a fully-gold 6/6 when maxed.
  function statBar(count, max) {
    if (max == null) max = MAX_UPGRADES;
    const maxed = count >= max;
    const filled = count + 1;            // base level counts as the first pip
    const total = max + 1;
    let pips = '';
    for (let i = 0; i < total; i++) {
      pips += '<i class="' + (i < filled ? 'on' : '') + (maxed ? ' max' : '') + '"></i>';
    }
    return '<div class="statbar' + (maxed ? ' maxed' : '') + '">' + pips + '</div>';
  }

  // One stat row for the main-view panel: label, current value, segmented bar.
  function statRow(label, value, count) {
    const maxed = count >= MAX_UPGRADES;
    return (
      '<div class="stat-row">' +
        '<div class="stat-label">' + label + '</div>' +
        '<div class="stat-val">' + value + (maxed ? ' <span class="stat-max">MAX</span>' : '') + '</div>' +
        statBar(count) +
      '</div>'
    );
  }

  function renderTopBar() {
    $('#money').textContent = fmt(state.money);
    $('#planeName').textContent = currentStats().name;
  }

  // Scene altitude (plane `top` in px). Ground = parked on grass; cruise = high.
  const GROUND_TOP = 96, CRUISE_TOP = 26;
  // Map flight progress (0..1) to a takeoff → cruise → landing altitude curve.
  function planeTopForProgress(p) {
    if (p <= 0.18) return GROUND_TOP + (CRUISE_TOP - GROUND_TOP) * (p / 0.18);      // climb
    if (p >= 0.82) return CRUISE_TOP + (GROUND_TOP - CRUISE_TOP) * ((p - 0.82) / 0.18); // descend
    return CRUISE_TOP;                                                              // cruise
  }

  // Ground scroll speed, matched to the trees so the runway parallax is correct:
  // the trees layer is 200% wide and travels -50% (= -100% of the scene width)
  // over 3.2s, i.e. one scene-width per 3.2s. Runways move at this same speed.
  const TREE_CYCLE_SEC = 3.2;
  const SCENE_W = 420;                                  // app max-width (scene width)
  const GROUND_PX_PER_SEC = SCENE_W / TREE_CYCLE_SEC;   // ≈131 px/s
  const OFFSCREEN = SCENE_W / 2 + 90;                   // past the edge incl. airport half-width
  // Two airports anchored in the moving ground:
  //  - departure: centered at takeoff (elapsed 0), then slides left at ground speed.
  //  - arrival: slides in from the right at ground speed, centered at touchdown
  //    (when remaining time is 0). Each only moves one direction; hidden off-screen.
  function depRunwayOffset(elapsedSec)  { return -GROUND_PX_PER_SEC * elapsedSec; }
  function arrRunwayOffset(remainSec)   { return  GROUND_PX_PER_SEC * remainSec; }

  // Build the repeating parallax strips once (each is 200% wide and scrolls -50%,
  // so the content must repeat across the first half to loop seamlessly).
  function cloudStripHTML() {
    const spots = [[6,18,70,22],[24,40,90,28],[40,30,60,18],[62,50,84,26],[80,22,74,22]];
    let h = '';
    for (let pass = 0; pass < 2; pass++) {
      spots.forEach(([x,y,w,hh]) =>
        h += '<div class="cloud" style="left:' + (x/2 + pass*50) + '%;top:' + y + 'px;width:' + w + 'px;height:' + hh + 'px"></div>');
    }
    return h;
  }
  function treeStripHTML() {
    // x positions (across a 50% span) + type; repeated twice for the loop.
    const items = [[3,'tree'],[11,'bush'],[18,'tree'],[27,'bush'],[34,'tree'],[42,'tree'],[47,'bush']];
    let h = '';
    for (let pass = 0; pass < 2; pass++) {
      items.forEach(([x,type]) => {
        const left = x/2 + pass*50;
        if (type === 'tree') h += '<div class="tree" style="left:' + left + '%"><div class="leaves"></div><div class="trunk"></div></div>';
        else h += '<div class="bush" style="left:' + left + '%"></div>';
      });
    }
    return h;
  }

  let sceneTier = null;     // which plane tier the scene shell was last built for
  let sceneFlightId = null; // which flight the scene last rendered (to detect a new takeoff)

  // The shell is rebuilt ONLY when the plane tier changes (a new sprite). Flight
  // state is just toggled on the existing nodes, so the scrolling clouds/trees
  // keep their animation position across flights (freeze on landing, resume next
  // flight) instead of resetting to 0 on every rebuild.
  function buildSceneShell(tier) {
    const scene = $('#scene');
    const airportHTML = '<div class="runway"></div><div class="tower"><div class="tower-cab"></div></div>';
    scene.innerHTML =
      '<div class="layer scroll-clouds paused">' + cloudStripHTML() + '</div>' +
      '<div class="layer scroll-trees paused">' + treeStripHTML() + '</div>' +
      // Two airports moving at the SAME ground speed as the trees: the one you
      // depart slides off left; the one you arrive at slides in from the right,
      // centered exactly at touchdown. Each only ever moves one direction (no
      // teleport/zoom) and is hidden while off-screen.
      '<div class="airport" id="airport-dep">' + airportHTML + '</div>' +
      '<div class="airport" id="airport-arr">' + airportHTML + '</div>' +
      '<div class="plane" data-plane="' + tier + '"></div>' +
      '<div class="flight-label"></div><div class="progress"><i></i></div>';
    sceneTier = tier;
  }

  function renderScene() {
    const f = state.activeFlight;
    const tier = state.planeId;
    if (sceneTier !== tier) buildSceneShell(tier);

    const scene = $('#scene');
    const plane = $('.plane');
    const dep = $('#airport-dep');
    const arr = $('#airport-arr');
    const flying = !!f;
    scene.classList.toggle('flying', flying);
    plane.classList.toggle('flying', flying);
    // Pause/resume the parallax scroll in place (no rebuild = no reset).
    scene.querySelectorAll('.layer').forEach(l => l.classList.toggle('paused', !flying));

    if (f) {
      const prog = Math.min(1, f.elapsedMs / f.totalMs);
      const pct = Math.round(prog * 100);
      plane.style.top = planeTopForProgress(prog).toFixed(1) + 'px';
      // On a NEW flight's first frame (including a queue auto-advance, where there's
      // no idle frame to snap on), the departure runway jumps from off-screen-left
      // back to center. Snap it that frame so the transition doesn't animate the
      // jump (which read as a zoom-in from the left). After that, it glides.
      const newFlight = f.jobId !== sceneFlightId;
      placeAirport(dep, depRunwayOffset(f.elapsedMs / 1000), newFlight);    // slides off left
      placeAirport(arr, arrRunwayOffset((f.totalMs - f.elapsedMs) / 1000), newFlight); // slides in from right
      sceneFlightId = f.jobId;
      $('.flight-label').textContent = 'Flying to ' + f.place + '… ' + pct + '%';
      $('.progress > i').style.width = pct + '%';
    } else {
      plane.style.top = GROUND_TOP + 'px';
      placeAirport(dep, 0, true);           // parked: snap (no transition) to centered, no streak
      arr.classList.add('hidden');          // arrival not needed while parked
      sceneFlightId = null;
    }
  }

  // Position one airport at a horizontal offset from center, hiding it once it's
  // fully off-screen so a far-offset element never streaks into view. `snap`
  // disables the smoothing transition for one frame, for instant repositioning
  // (e.g. resetting the departure runway to center on landing without a streak).
  function placeAirport(el, offsetPx, snap) {
    el.classList.toggle('hidden', Math.abs(offsetPx) >= OFFSCREEN);
    if (snap) {
      el.style.transition = 'none';
      el.style.transform = 'translateX(calc(-50% + ' + offsetPx.toFixed(1) + 'px))';
      el.offsetWidth;                        // force reflow so the next change re-enables transition
      el.style.transition = '';
      return;
    }
    el.style.transform = 'translateX(calc(-50% + ' + offsetPx.toFixed(1) + 'px))';
  }

  // Update the in-flight job row's gold progress fill (cheap; called each tick on
  // the Fly view). The row itself is built by renderFly with data-active-job.
  function updateActiveJobProgress() {
    const f = state.activeFlight;
    if (!f) return;
    const row = $('[data-active-job]');
    if (!row) return;
    const pct = Math.round(Math.min(1, f.elapsedMs / f.totalMs) * 100);
    row.style.setProperty('--pct', pct + '%');
  }

  function renderFly() {
    const cap = currentStats().capacity;
    const f = state.activeFlight;
    const flying = !!f;
    const queueHasRoom = state.queue.length < queueSize();
    const rows = state.jobs.map(job => {
      const isActive = flying && job.id === f.jobId;             // the job currently in flight
      const takeable = canTakeJob(job, cap);
      // Tappable when: idle (fly now), or flying with queue room (queue it). NOT the
      // in-flight job itself — it stays on the board for its progress fill, so
      // without this guard tapping it would enqueue the flying job behind itself.
      const ok = !isActive && takeable && (!flying || queueHasRoom);
      const locked = !takeable;
      const cls = 'job' + (isActive ? ' active' : (ok ? '' : ' disabled'));
      const initPct = isActive ? Math.round(Math.min(1, f.elapsedMs / f.totalMs) * 100) : 0;
      return (
        '<div class="' + cls + '" ' +
          (ok ? 'data-job="' + job.id + '"' : '') +
          (isActive ? ' data-active-job style="--pct:' + initPct + '%"' : '') + '>' +
          '<div class="job-main">' +
            '<div class="job-who">' + job.customer + ' → ' + job.place + '</div>' +
            '<div class="job-meta">📦 ' + job.cargo + '  ·  ' + job.flightTime + 's</div>' +
          '</div>' +
          '<div class="job-pay">' + fmt(job.payout) +
            (locked ? '<span class="lock">Need more capacity</span>' : '') +
          '</div>' +
          (flying ? '' : '<button class="job-decline" data-decline="' + job.id +
            '" title="Decline this job" aria-label="Decline job">✕</button>') +
        '</div>'
      );
    }).join('');
    const st = currentStats();
    const cp = curPlane();
    const panel =
      '<div class="stat-panel">' +
        statRow('📦 CARGO', st.capacity, cp.capUps) +
        statRow('SPEED', st.speed.toFixed(1), cp.speedUps) +
      '</div>';
    $('#content').innerHTML = panel + queueStripHTML() + '<div class="job-board">' + rows + '</div>';
  }

  // The queue strip: a label + a row of slots (filled jobs are tap-to-remove).
  function queueStripHTML() {
    const size = queueSize();
    let slots = '';
    for (let i = 0; i < size; i++) {
      const job = state.queue[i];
      if (job) {
        slots += '<div class="queue-slot filled" data-dequeue="' + job.id + '" title="Remove from queue">' +
          '<div class="qs-place">→ ' + job.place + '</div>' +
          '<div class="qs-meta">📦 ' + job.cargo + '</div>' +
        '</div>';
      } else {
        slots += '<div class="queue-slot empty">·</div>';
      }
    }
    return '<div class="queue-strip">' +
      '<div class="queue-label">QUEUE ' + state.queue.length + '/' + size + '</div>' +
      '<div class="queue-slots">' + slots + '</div>' +
    '</div>';
  }

  function renderUpgrade() {
    const st = currentStats();
    const cp = curPlane();
    const capMaxed = cp.capUps >= MAX_UPGRADES;
    const speedMaxed = cp.speedUps >= MAX_UPGRADES;
    const engineCost = upgradeCost(cp.speedUps);
    const cargoCost = upgradeCost(cp.capUps);
    const canEngine = !speedMaxed && state.money >= engineCost;
    const canCargo = !capMaxed && state.money >= cargoCost;
    const engineBtn = speedMaxed
      ? '<div class="up-maxed">MAXED — buy a bigger plane in the Shop</div>'
      : '<button class="up-btn' + (canEngine ? '' : ' disabled') + '" data-up="engine">' +
          'Upgrade Engine — ' + fmt(engineCost) + '</button>';
    const cargoBtn = capMaxed
      ? '<div class="up-maxed">MAXED — buy a bigger plane in the Shop</div>'
      : '<button class="up-btn' + (canCargo ? '' : ' disabled') + '" data-up="cargo">' +
          'Upgrade Cargo Hold — ' + fmt(cargoCost) + '</button>';
    const queueMaxed = state.queueUps >= MAX_QUEUE_UPGRADES;
    const queueCost = queueMaxed ? 0 : queueUpgradeCost(state.queueUps);
    const canQueue = !queueMaxed && state.money >= queueCost;
    const queueBtn = queueMaxed
      ? '<div class="up-maxed">MAXED — queue is at its biggest</div>'
      : '<button class="up-btn' + (canQueue ? '' : ' disabled') + '" data-up="queue">' +
          'Upgrade Queue — ' + fmt(queueCost) + '</button>';
    $('#content').innerHTML =
      '<div class="up-card">' +
        '<div class="up-title">Engine · Speed ' + st.speed.toFixed(2) + '</div>' +
        statBar(cp.speedUps) + engineBtn +
      '</div>' +
      '<div class="up-card">' +
        '<div class="up-title">📦 Cargo Hold · Capacity ' + st.capacity + '</div>' +
        statBar(cp.capUps) + cargoBtn +
      '</div>' +
      '<div class="up-card">' +
        '<div class="up-title">Queue · Size ' + queueSize() + '</div>' +
        statBar(state.queueUps, MAX_QUEUE_UPGRADES) + queueBtn +
      '</div>';
  }

  function renderShop() {
    const flying = !!state.activeFlight;
    const rows = PLANES.map(p => {
      const isCurrent = p.id === state.planeId;
      const owned = !!state.planes[p.id];
      let right;
      if (isCurrent) {
        right = '<span class="owned">FLYING</span>';
      } else if (owned) {
        right = '<button class="switch-btn' + (flying ? ' disabled' : '') +
                '" data-switch="' + p.id + '">Switch</button>';
      } else {
        const affordable = state.money >= p.price;
        right = '<button class="buy-btn' + (affordable ? '' : ' disabled') +
                '" data-plane="' + p.id + '">' + fmt(p.price) + '</button>';
      }
      return (
        '<div class="plane-row">' +
          '<div class="plane-thumb" data-plane-thumb="' + p.id + '"></div>' +
          '<div class="plane-info"><div class="plane-name">' + p.name + '</div>' +
          '<div class="plane-stats">Cap ' + p.cap + ' · Spd ' + p.speed.toFixed(1) + '</div></div>' +
          right +
        '</div>'
      );
    }).join('');
    $('#content').innerHTML = '<div class="shop-list">' + rows + '</div>';
  }

  function renderCurrentView() {
    if (currentView === 'fly') renderFly();
    else if (currentView === 'upgrade') renderUpgrade();
    else if (currentView === 'shop') renderShop();
  }

  function renderAll() {
    if (screen !== 'game') return;
    renderTopBar();
    renderScene();        // keep the always-visible scene plane in sync (cheap; cache-guarded)
    renderCurrentView();
  }

  function setView(view) {
    currentView = view;
    document.querySelectorAll('.nav-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.view === view));
    renderScene();          // keep the always-visible scene in sync on tab change
    renderCurrentView();
  }

  // ---- Loop ----
  const TICK_MS = 100;
  function tick() {
    const f = state.activeFlight;
    if (f) {
      // Drive progress from wall-clock so a mid-flight reload keeps its place.
      f.elapsedMs = Date.now() - f.startedAt;
      if (f.elapsedMs >= f.totalMs) {
        completeFlight();
        renderAll();
      } else if (screen === 'game') {
        // Update the always-visible scene every tick regardless of the active
        // tab, plus the in-flight job row's progress fill while on the Fly view.
        renderScene();
        if (currentView === 'fly') updateActiveJobProgress();
      }
    }
  }

  // ---- Events ----
  function onContentClick(e) {
    // Decline must be checked before job-start: the ✕ lives inside the job card.
    const declineEl = e.target.closest('[data-decline]');
    if (declineEl) {
      if (declineJob(declineEl.dataset.decline)) renderAll();
      return;
    }
    const dequeueEl = e.target.closest('[data-dequeue]');
    if (dequeueEl) {
      if (dequeueJob(dequeueEl.dataset.dequeue)) renderAll();
      return;
    }
    const jobEl = e.target.closest('[data-job]');
    if (jobEl) {
      const job = state.jobs.find(j => j.id === jobEl.dataset.job);
      if (job) {
        const acted = state.activeFlight ? enqueueJob(job) : startJob(job);
        if (acted) renderAll();
      }
      return;
    }
    const upBtn = e.target.closest('[data-up]');
    if (upBtn) {
      const which = upBtn.dataset.up;
      const ok = which === 'engine' ? buyEngineUpgrade()
               : which === 'cargo'  ? buyCargoUpgrade()
               : which === 'queue'  ? buyQueueUpgrade() : false;
      if (ok) renderAll();
      return;
    }
    const switchEl = e.target.closest('[data-switch]');
    if (switchEl) {
      if (switchPlane(switchEl.dataset.switch)) renderAll();
      return;
    }
    const planeBtn = e.target.closest('[data-plane]');
    if (planeBtn) {
      if (buyPlane(planeBtn.dataset.plane)) renderAll();
      return;
    }
  }

  function onNavClick(e) {
    const btn = e.target.closest('.nav-btn');
    if (btn) setView(btn.dataset.view);
  }

  function onTitleClick(e) {
    const btn = e.target.closest('[data-title-action]');
    if (!btn) return;
    const action = btn.dataset.titleAction;
    if (action === 'start' || action === 'continue') { startGame(); return; }
    if (action === 'new') { $('#title-confirm').hidden = false; return; }
    if (action === 'cancel-new') { $('#title-confirm').hidden = true; return; }
    if (action === 'confirm-new') { resetGame(); startGame(); return; }
  }

  function onTopbarClick(e) {
    if (e.target.closest('[data-home]')) showTitle();
  }

  // ---- Boot ----
  function boot() {
    try { savePresentAtLoad = !!localStorage.getItem(SAVE_KEY); } catch (e) { savePresentAtLoad = false; }
    state = load();
    // Reconcile a persisted flight: derive startedAt from saved elapsed so
    // progress resumes from where it left off (and old saves without it heal).
    const f = state.activeFlight;
    if (f && typeof f.startedAt !== 'number') {
      f.startedAt = Date.now() - (f.elapsedMs || 0);
    }
    refillBoard();
    save();
    $('#content').addEventListener('click', onContentClick);
    $('#nav').addEventListener('click', onNavClick);
    $('#title').addEventListener('click', onTitleClick);
    $('#topbar').addEventListener('click', onTopbarClick);
    currentView = 'fly';
    // Set the active nav tab without rendering the (hidden) game view yet;
    // startGame() → renderAll() renders it when the player actually enters.
    document.querySelectorAll('.nav-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.view === 'fly'));
    showTitle();             // land on the title screen, not straight into the game
    setInterval(tick, TICK_MS);
  }
  boot();

  // Register the service worker for offline play / installability (best-effort).
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./sw.js').catch(function () {});
    });
  }
</script>
</body>
</html>
